    <g font-family="Inter" font-size="8" fill="#94A3B8" text-anchor="middle">
      <text x="16" y="156">W-12</text>
      <text x="152" y="156">W-8</text>
      <text x="288" y="156">W-4</text>
      <text x="390" y="156">W-1</text>
    </g>
  </g>

  <g font-family="Inter" font-size="9" fill="#475569" transform="translate(300, 22)">
    <rect x="-4" y="-14" width="12" height="10" fill="#3B82F6" rx="2"/>
    <text x="12" y="-5">주간 거리</text>
    <line x1="72" y1="-9" x2="88" y2="-9" stroke="#1E40AF" stroke-width="2"/>
    <circle cx="80" cy="-9" r="2" fill="#1E40AF"/>
