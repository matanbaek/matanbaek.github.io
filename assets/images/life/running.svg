      <rect x="276" y="40"  width="24" height="100" rx="3" fill="#3B82F6"/>
      <rect x="310" y="28"  width="24" height="112" rx="3" fill="#3B82F6"/>
      <rect x="344" y="20"  width="24" height="120" rx="3" fill="#3B82F6"/>
      <rect x="378" y="28"  width="24" height="112" rx="3" fill="#3B82F6"/>
    </g>

    <path d="M 16 136 L 50 132 L 84 126 L 118 120 L 152 112 L 186 105 L 220 97 L 254 88 L 288 81 L 322 72 L 356 62 L 390 54 L 402 52 L 402 140 L 16 140 Z" fill="url(#areaFill)"/>
    <path d="M 16 136 L 50 132 L 84 126 L 118 120 L 152 112 L 186 105 L 220 97 L 254 88 L 288 81 L 322 72 L 356 62 L 390 54" fill="none" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <g>
      <circle cx="16"  cy="136" r="2.5" fill="#1E40AF"/>
      <circle cx="50"  cy="132" r="2.5" fill="#1E40AF"/>
      <circle cx="84"  cy="126" r="2.5" fill="#1E40AF"/>
      <circle cx="118" cy="120" r="2.5" fill="#1E40AF"/>
      <circle cx="152" cy="112" r="2.5" fill="#1E40AF"/>
      <circle cx="186" cy="105" r="2.5" fill="#1E40AF"/>
      <circle cx="220" cy="97"  r="2.5" fill="#1E40AF"/>
      <circle cx="254" cy="88"  r="2.5" fill="#1E40AF"/>
      <circle cx="288" cy="81"  r="2.5" fill="#1E40AF"/>
      <circle cx="322" cy="72"  r="2.5" fill="#1E40AF"/>
      <circle cx="356" cy="62"  r="2.5" fill="#1E40AF"/>
      <circle cx="390" cy="54"  r="2.5" fill="#1E40AF"/>
