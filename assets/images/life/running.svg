<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Running Log: weekly load chart, pace histogram, and AI coach stats">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8FAFC"/>
    <stop offset="100%" stop-color="#DCE8FB"/>
  </linearGradient>
  <radialGradient id="glow" cx="62%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
  </linearGradient>
</defs>

<rect width="800" height="450" fill="url(#bg)"/>
<rect width="800" height="450" fill="url(#glow)"/>

<text x="40" y="50" font-family="Inter" font-size="11" fill="#3B82F6" font-weight="600" letter-spacing="1.4">LIFE LOG · RUNNING</text>
<text x="40" y="94" font-family="Inter" font-size="30" fill="#0F172A" font-weight="700" letter-spacing="-0.5">Pace</text>
<text x="40" y="126" font-family="Inter" font-size="30" fill="#0F172A" font-weight="700" letter-spacing="-0.5">&amp; Load</text>
<text x="40" y="156" font-family="Inter" font-size="12" fill="#475569">주간 부하 · 페이스 분포</text>
<text x="40" y="174" font-family="Inter" font-size="12" fill="#475569">GPT-4o 코치 파이프라인</text>

<g font-family="Inter">
  <rect x="40" y="200" width="222" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="56" y="218" font-size="10" fill="#64748B" font-weight="600" letter-spacing="1">CUMULATIVE</text>
  <text x="56" y="234" font-size="16" fill="#1E40AF" font-weight="700">1,247 km</text>
  <rect x="40" y="250" width="222" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="56" y="268" font-size="10" fill="#64748B" font-weight="600" letter-spacing="1">BEST 10K PACE</text>
  <text x="56" y="284" font-size="16" fill="#1E40AF" font-weight="700">4'52" / km</text>
  <rect x="40" y="300" width="222" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="56" y="318" font-size="10" fill="#64748B" font-weight="600" letter-spacing="1">AI COACH SESSIONS</text>
  <text x="56" y="334" font-size="16" fill="#1E40AF" font-weight="700">62 회</text>
</g>

<g transform="translate(300, 50)">
  <rect x="0" y="0" width="460" height="220" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="20" y="26" font-family="Inter" font-size="10" fill="#64748B" font-weight="600" letter-spacing="0.8">WEEKLY DISTANCE &amp; CUMULATIVE (12 WEEKS)</text>

  <g transform="translate(24, 48)">
    <g stroke="#E2E8F0" stroke-width="0.6">
      <line x1="0" y1="0" x2="412" y2="0"/>
