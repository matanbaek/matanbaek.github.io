  </g>
</g>

<g transform="translate(300, 290)">
  <rect x="0" y="0" width="460" height="126" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="20" y="22" font-family="Inter" font-size="10" fill="#64748B" font-weight="600" letter-spacing="0.8">PACE DISTRIBUTION (last 90 days)</text>
  <g transform="translate(20, 40)">
    <rect x="0"   y="42" width="26" height="32" fill="#BFDBFE"/>
    <rect x="32"  y="28" width="26" height="46" fill="#93C5FD"/>
    <rect x="64"  y="14" width="26" height="60" fill="#60A5FA"/>
    <rect x="96"  y="4"  width="26" height="70" fill="#3B82F6"/>
    <rect x="128" y="10" width="26" height="64" fill="#3B82F6"/>
    <rect x="160" y="20" width="26" height="54" fill="#1E40AF"/>
    <rect x="192" y="30" width="26" height="44" fill="#1E40AF"/>
    <rect x="224" y="44" width="26" height="30" fill="#1E40AF" fill-opacity="0.6"/>
    <rect x="256" y="54" width="26" height="20" fill="#1E40AF" fill-opacity="0.4"/>
    <line x1="-6" y1="74" x2="288" y2="74" stroke="#CBD5E1" stroke-width="0.8"/>
    <g font-family="Inter" font-size="8" fill="#94A3B8">
      <text x="0"   y="86">4'30</text>
      <text x="64"  y="86">5'00</text>
      <text x="128" y="86">5'30</text>
      <text x="192" y="86">6'00</text>
      <text x="256" y="86">6'30</text>
    </g>
    <rect x="96"  y="-8" width="26" height="2" fill="#1E40AF"/>
    <text x="124" y="-4" font-family="Inter" font-size="8" fill="#1E40AF" font-weight="600">Tempo</text>
    <rect x="192" y="-8" width="58" height="2" fill="#60A5FA"/>
    <text x="254" y="-4" font-family="Inter" font-size="8" fill="#60A5FA" font-weight="600">Easy Z2</text>
  </g>

  <g transform="translate(320, 14)">
    <rect x="0" y="0" width="126" height="96" rx="8" fill="#EFF4FB" stroke="#DBEAFE"/>
    <text x="14" y="22" font-family="Inter" font-size="9" fill="#64748B" font-weight="600" letter-spacing="0.6">WEEKLY AVG</text>
    <text x="14" y="52" font-family="Inter" font-size="22" fill="#1E40AF" font-weight="700">28.4 km</text>
    <text x="14" y="72" font-family="Inter" font-size="9" fill="#3B82F6">+10% capped</text>
    <text x="14" y="86" font-family="Inter" font-size="9" fill="#3B82F6">(Atkinson rule)</text>
  </g>
</g>

<line x1="284" y1="44" x2="284" y2="406" stroke="#CBD5E1" stroke-width="0.6" stroke-dasharray="3 4"/>

<rect x="670" y="420" width="110" height="22" rx="4" fill="#0F172A" fill-opacity="0.9"/>
<text x="725" y="435" font-family="Inter" font-size="10" fill="#DBEAFE" text-anchor="middle" letter-spacing="1.2" font-weight="600">AI RUN COACH</text>
</svg>
