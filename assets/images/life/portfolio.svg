<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Portfolio Log: asset allocation donut, cumulative TWR line vs benchmarks, dual AI consensus rebalancing log">
<defs>
