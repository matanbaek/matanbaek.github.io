<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI Copyright Case Study: Fair Use 4-factor comparison heatmap across 7 AI training cases">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8FAFC"/>
    <stop offset="100%" stop-color="#DCE8FB"/>
  </linearGradient>
  <radialGradient id="glow" cx="55%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
